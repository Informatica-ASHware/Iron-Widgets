# PROTECTED: No cambiar versiones ni flujos de CI sin justificacion en PR_JUSTIFICATION.md
name: iron_widgets
description: >-
  A Flutter widget library with Iron Man aesthetics: themed micro-widgets,
  form controls and show-panels, all driven by IronWidgetsTheme.
version: 1.0.2
homepage: https://github.com/Informatica-ASHware/Iron-Widgets
repository: https://github.com/Informatica-ASHware/Iron-Widgets
issue_tracker: https://github.com/Informatica-ASHware/Iron-Widgets/issues

environment:
  sdk: ">=3.11.5 <4.0.0"
  flutter: ">=3.41.7"

# === Pub Workspaces (Dart 3.6+) ===
workspace:
  - example

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  melos: ^7.0.30

melos:
  name: iron_widgets_workspace
  useRootAsPackage: true

  packages:
    - "example"

  command:
    bootstrap:
      environment:
        sdk: ">=3.11.5 <4.0.0"
        flutter: ">=3.41.7"

  scripts:
    analyze:
      description: "Analyze all packages in the workspace."
      run: melos exec -- "dart analyze ."

    test:
      description: "Run all tests."
      run: melos exec -- "flutter test"
      packageFilters:
        dirExists: test

    format:
      description: "Format all Dart files."
      run: melos exec -- "dart format ."

    pkg:version:
      description: "Bump versions and generate changelogs."
      run: melos version --yes

    pkg:publish:
      description: "Publish packages to pub.dev."
      run: melos publish --yes --no-dry-run

    pkg:release:
      description: "Full release cycle: version bump + publish."
      run: melos run pkg:version && melos run pkg:publish

    pkg:release:patch:
      description: "Force a patch version bump and publish."
      run: melos version iron_widgets patch --yes && melos run pkg:publish

    pkg:release:dev:
      description: "Pre-release cycle: version bump (dev) + publish."
      run: melos version --prerelease=dev --yes && melos run pkg:publish

    pkg:release:patch:dev:
      description: "Force a patch dev version bump and publish."
      run: melos version iron_widgets patch --preid=dev --yes && melos run pkg:publish
