name: iron_widgets
description: >-
  A Flutter widget library with Iron Man aesthetics: themed micro-widgets,
  form controls and show-panels, all driven by IronWidgetsTheme.
version: 1.0.0
homepage: https://github.com/yourusername/iron_widgets
repository: https://github.com/yourusername/iron_widgets
issue_tracker: https://github.com/yourusername/iron_widgets/issues

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  # Pure widget library – no assets required at package level.
